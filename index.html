<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spelling Game</title>
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

<!-- TOP BAR -->
<div class="top">
  <div id="mistakes">Mistakes: none</div>
  <button id="themeBtn">🌙 Dark</button>
</div>

<!-- GAME AREA -->
<div class="center">
  <div id="combo">Score x0</div>

<input 
  id="input"
  type="text"
  inputmode="latin"
  placeholder="Type what you hear..."
  autocomplete="off"
  autocorrect="off"
  autocapitalize="none"
  spellcheck="false"
>

  <button id="playBtn">▶ Play</button>
</div>

<!-- WORD LIST (ALWAYS VISIBLE) -->
<div id="listContainer" style="margin-top:30px;">

  <h3>Word Lists</h3>

  <!-- BEGINNER -->
  <div class="level-block">
    <label>
      <input type="checkbox" data-level="beginner" checked>
      <span>Beginner</span>
    </label>
    <div class="word-list" id="beginnerWords"></div>
  </div>

  <!-- INTERMEDIATE -->
  <div class="level-block">
    <label>
      <input type="checkbox" data-level="intermediate" checked>
      <span>Intermediate</span>
    </label>
    <div class="word-list" id="intermediateWords"></div>
  </div>

  <!-- SENIOR -->
  <div class="level-block">
    <label>
      <input type="checkbox" data-level="senior" checked>
      <span>Senior</span>
    </label>
    <div class="word-list" id="seniorWords"></div>
  </div>

  <!-- MASTER -->
  <div class="level-block">
    <label>
      <input type="checkbox" data-level="master" checked>
      <span>Master</span>
    </label>
    <div class="word-list" id="masterWords"></div>
  </div>

</div>

<script src="script.js"></script>

<div class="bottom-strip">
  <img src="images/banner.jpg" alt="banner">
</div>

</body>
</html>
